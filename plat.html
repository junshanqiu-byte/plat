<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>山秋枫树园 · 浅天青色 · 三种风格</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
        /* ================================================================
           全局基础 — 浅天青色全屏背景
           ================================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #e4f0ed;
            /* 浅天青色全屏底色 */
            color: #1c2e2a;
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ================================================================
           页面布局
           ================================================================ */
        .page-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            gap: 20px;
            background: #e4f0ed;
        }

        /* ================================================================
           风格切换栏
           ================================================================ */
        .style-switcher {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            flex-shrink: 0;
            z-index: 60;
        }
        .style-switcher button {
            padding: 8px 24px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
        }
        .style-switcher button:hover {
            color: rgba(0, 0, 0, 0.6);
        }
        .style-switcher button.active {
            background: #ffffff;
            color: #1c2e2a;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }
        .style-switcher button .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
        .style-switcher button .dot.d1 {
            background: #7fc1c5;
        }
        .style-switcher button .dot.d2 {
            background: #6baa9e;
        }
        .style-switcher button .dot.d3 {
            background: #6e9bb5;
        }

        /* ================================================================
           手机模拟器
           ================================================================ */
        .phone-mockup {
            position: relative;
            width: 393px;
            height: 852px;
            border-radius: 48px;
            background: #000;
            padding: 12px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.02);
            flex-shrink: 0;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            background: #f0f8f5;
        }
        /* 动态岛 — 纯黑，无任何文字 */
        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 34px;
            background: #000;
            border-radius: 20px;
            z-index: 50;
            pointer-events: none;
        }

        /* ================================================================
           应用容器（风格切换的目标）
           ================================================================ */
        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* ===== Views ===== */
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(12px);
            will-change: transform, opacity;
        }
        .view.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            z-index: 10;
        }

        /* ================================================================
           首页
           ================================================================ */
        .home-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 28px;
            -webkit-overflow-scrolling: touch;
        }
        .home-scroll::-webkit-scrollbar {
            width: 2px;
        }
        .home-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 10px;
        }

        .home-hero {
            padding: 32px 0 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }
        .home-hero .brand-line {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .home-hero h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.15;
        }
        .home-hero h1 .hl {
            color: #4a8c8a;
        }
        .home-hero .sub {
            font-size: 14px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.35);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .home-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .home-card {
            border-radius: 20px;
            padding: 20px 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }
        .home-card:active {
            transform: scale(0.96);
        }
        .home-card .card-glow {
            position: absolute;
            top: -1px;
            left: 10%;
            right: 10%;
            height: 1px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .home-card:hover .card-glow {
            opacity: 1;
        }
        .home-card .card-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.2px;
            line-height: 1.3;
        }
        .home-card .card-desc {
            font-size: 12px;
            font-weight: 400;
            margin-top: 4px;
            line-height: 1.4;
        }
        .home-card .card-meta {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 12px;
            border-radius: 30px;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .home-footer {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            text-align: center;
        }
        .home-footer .copyright {
            font-size: 10px;
            letter-spacing: 0.8px;
            line-height: 1.6;
        }

        /* ================================================================
           模块通用
           ================================================================ */
        .module-header {
            flex-shrink: 0;
            padding: 12px 16px 10px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .module-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.06);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            font-weight: 300;
            line-height: 1;
            background: rgba(0, 0, 0, 0.03);
            color: #555;
        }
        .module-back:active {
            transform: scale(0.92);
            background: rgba(0, 0, 0, 0.08);
        }
        .module-header .m-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            letter-spacing: -0.2px;
        }
        .module-header .m-sub {
            font-size: 11px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.25);
            letter-spacing: 0.5px;
        }

        .module-iframe-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #fff;
        }
        .module-iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* 防止重载弹出确认框 */
            sandbox: allow-scripts allow-same-origin allow-forms;
            loading: lazy;
        }

        .variety-fallback {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .variety-fallback p {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.35);
            line-height: 1.7;
        }
        .variety-fallback .link {
            display: inline-block;
            margin-top: 14px;
            padding: 10px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        .variety-fallback .link:active {
            transform: scale(0.96);
        }

        /* ================================================================
           底部导航条（固定在底部）
           ================================================================ */
        .bottom-nav {
            flex-shrink: 0;
            padding: 10px 20px 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            bottom: 0;
            z-index: 20;
        }
        .bottom-nav .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(0, 0, 0, 0.04);
            color: #555;
        }
        .bottom-nav .nav-btn:active {
            transform: scale(0.94);
            background: rgba(0, 0, 0, 0.08);
        }
        .bottom-nav .nav-btn .arrow {
            font-size: 18px;
            line-height: 1;
        }
        #viewHome .bottom-nav {
            display: none !important;
        }

        /* ================================================================
           三种风格 — 直接作用于 .app-container
           ================================================================ */
        .app-container.style-mint {
            background: #f0f8f5;
        }
        .app-container.style-spring {
            background: #eef6f1;
        }
        .app-container.style-misty {
            background: #edf3f5;
        }

        /* 各风格下的子元素颜色（依赖父级类） */
        .app-container.style-mint .home-hero .brand-line {
            color: #5fa8a6;
        }
        .app-container.style-mint .home-hero h1 .hl {
            color: #5fa8a6;
        }
        .app-container.style-mint .home-card {
            background: #ffffff;
            border: 1px solid rgba(95, 168, 166, 0.08);
            box-shadow: 0 2px 16px rgba(95, 168, 166, 0.04);
        }
        .app-container.style-mint .home-card:active {
            background: #f0f7f5;
        }
        .app-container.style-mint .home-card .card-glow {
            background: linear-gradient(90deg, transparent, rgba(95, 168, 166, 0.12), transparent);
        }
        .app-container.style-mint .home-card .card-meta {
            color: #5fa8a6;
            background: rgba(95, 168, 166, 0.06);
        }
        .app-container.style-mint .module-header {
            background: rgba(240, 248, 245, 0.85);
        }
        .app-container.style-mint .module-back {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(0, 0, 0, 0.04);
            color: #3a5a55;
        }
        .app-container.style-mint .module-back:active {
            background: rgba(0, 0, 0, 0.06);
        }
        .app-container.style-mint .variety-fallback .link {
            background: #5fa8a6;
            color: #fff;
        }
        .app-container.style-mint .bottom-nav {
            background: rgba(240, 248, 245, 0.85);
        }
        .app-container.style-mint .bottom-nav .nav-btn {
            color: #3a5a55;
            background: rgba(95, 168, 166, 0.06);
        }
        .app-container.style-mint .bottom-nav .nav-btn:active {
            background: rgba(95, 168, 166, 0.12);
        }

        /* 风格2：水绿 */
        .app-container.style-spring .home-hero .brand-line {
            color: #6baa9e;
            font-family: "Playfair Display", serif;
            font-weight: 400;
            letter-spacing: 3px;
        }
        .app-container.style-spring .home-hero h1 {
            font-family: "Playfair Display", serif;
            font-weight: 700;
        }
        .app-container.style-spring .home-hero h1 .hl {
            color: #6baa9e;
        }
        .app-container.style-spring .home-hero .sub {
            color: rgba(30, 51, 44, 0.4);
            font-family: "Inter", sans-serif;
        }
        .app-container.style-spring .home-card {
            background: #ffffff;
            border: 1px solid rgba(107, 170, 158, 0.08);
            box-shadow: 0 4px 24px rgba(107, 170, 158, 0.04);
            border-radius: 24px;
        }
        .app-container.style-spring .home-card:active {
            background: #f0f8f3;
        }
        .app-container.style-spring .home-card .card-glow {
            background: linear-gradient(90deg, transparent, rgba(107, 170, 158, 0.12), transparent);
        }
        .app-container.style-spring .home-card .card-title {
            font-family: "Playfair Display", serif;
            font-weight: 600;
        }
        .app-container.style-spring .home-card .card-desc {
            font-family: "Inter", sans-serif;
        }
        .app-container.style-spring .home-card .card-meta {
            color: #6baa9e;
            background: rgba(107, 170, 158, 0.08);
            font-family: "Inter", sans-serif;
        }
        .app-container.style-spring .module-header {
            background: rgba(238, 246, 241, 0.88);
        }
        .app-container.style-spring .module-header .m-title {
            font-family: "Playfair Display", serif;
            font-weight: 600;
        }
        .app-container.style-spring .module-back {
            background: rgba(30, 51, 44, 0.04);
            border-color: rgba(30, 51, 44, 0.06);
            color: #4a6e62;
        }
        .app-container.style-spring .module-back:active {
            background: rgba(30, 51, 44, 0.08);
        }
        .app-container.style-spring .variety-fallback .link {
            background: #6baa9e;
            color: #fff;
        }
        .app-container.style-spring .bottom-nav {
            background: rgba(238, 246, 241, 0.85);
        }
        .app-container.style-spring .bottom-nav .nav-btn {
            color: #4a6e62;
            background: rgba(107, 170, 158, 0.06);
        }
        .app-container.style-spring .bottom-nav .nav-btn:active {
            background: rgba(107, 170, 158, 0.12);
        }

        /* 风格3：灰蓝 */
        .app-container.style-misty .home-hero .brand-line {
            color: #6e9bb5;
            letter-spacing: 3px;
        }
        .app-container.style-misty .home-hero h1 .hl {
            color: #6e9bb5;
        }
        .app-container.style-misty .home-hero .sub {
            color: rgba(29, 47, 56, 0.35);
        }
        .app-container.style-misty .home-card {
            background: #ffffff;
            border: 1px solid rgba(110, 155, 181, 0.06);
            box-shadow: 0 4px 24px rgba(110, 155, 181, 0.04);
            border-radius: 20px;
        }
        .app-container.style-misty .home-card:active {
            background: #eef4f7;
        }
        .app-container.style-misty .home-card .card-glow {
            background: linear-gradient(90deg, transparent, rgba(110, 155, 181, 0.10), transparent);
        }
        .app-container.style-misty .home-card .card-meta {
            color: #6e9bb5;
            background: rgba(110, 155, 181, 0.06);
        }
        .app-container.style-misty .module-header {
            background: rgba(237, 243, 245, 0.85);
        }
        .app-container.style-misty .module-back {
            background: rgba(29, 47, 56, 0.03);
            border-color: rgba(29, 47, 56, 0.05);
            color: #4a6d7e;
        }
        .app-container.style-misty .module-back:active {
            background: rgba(29, 47, 56, 0.08);
        }
        .app-container.style-misty .variety-fallback .link {
            background: #6e9bb5;
            color: #fff;
        }
        .app-container.style-misty .bottom-nav {
            background: rgba(237, 243, 245, 0.85);
        }
        .app-container.style-misty .bottom-nav .nav-btn {
            color: #4a6d7e;
            background: rgba(110, 155, 181, 0.06);
        }
        .app-container.style-misty .bottom-nav .nav-btn:active {
            background: rgba(110, 155, 181, 0.12);
        }

        /* ================================================================
           响应式
           ================================================================ */
        @media (max-width: 440px) {
            .phone-mockup {
                width: 100%;
                height: auto;
                aspect-ratio: 393 / 852;
                border-radius: 32px;
                padding: 8px;
            }
            .phone-screen {
                border-radius: 26px;
            }
            .dynamic-island {
                width: 100px;
                height: 30px;
                top: 10px;
            }
            .style-switcher button {
                padding: 6px 14px;
                font-size: 12px;
            }
            .page-wrap {
                padding: 12px;
                gap: 14px;
            }
            .home-hero h1 {
                font-size: 26px;
            }
            .home-card {
                padding: 16px 14px;
            }
            .home-card .card-title {
                font-size: 14px;
            }
        }
        @media (max-width: 380px) {
            .style-switcher button {
                padding: 4px 10px;
                font-size: 11px;
            }
            .style-switcher button .dot {
                width: 6px;
                height: 6px;
                margin-right: 4px;
            }
            .home-hero h1 {
                font-size: 22px;
            }
            .home-grid {
                gap: 8px;
            }
            .home-card {
                padding: 14px 10px;
                border-radius: 16px;
            }
            .home-card .card-title {
                font-size: 13px;
            }
            .home-card .card-desc {
                font-size: 11px;
            }
            .module-header .m-title {
                font-size: 15px;
            }
        }
        @media (min-width: 600px) {
            .page-wrap {
                padding: 30px;
            }
            .style-switcher {
                padding: 8px;
            }
            .style-switcher button {
                padding: 10px 32px;
                font-size: 14px;
            }
            .phone-mockup {
                box-shadow: 0 40px 100px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.02);
            }
        }
    </style>
</head>
<body>

    <div class="page-wrap">
        <!-- 风格切换栏 -->
        <div class="style-switcher">
            <button class="active" data-style="mint">
                <span class="dot d1"></span>浅青白
            </button>
            <button data-style="spring">
                <span class="dot d2"></span>水绿色
            </button>
            <button data-style="misty">
                <span class="dot d3"></span>灰蓝色
            </button>
        </div>

        <!-- 手机模拟器 -->
        <div class="phone-mockup">
            <div class="phone-screen">
                <!-- 纯黑动态岛，无文字 -->
                <div class="dynamic-island"></div>

                <div class="app-container style-mint" id="appContainer">

                    <!-- ===== 首页 ===== -->
                    <div class="view active" id="viewHome">
                        <div class="home-scroll">
                            <div class="home-hero">
                                <div class="brand-line">山秋枫树园</div>
                                <h1>庭院美学顾问<br /><span class="hl">主播赋能平台</span></h1>
                                <div class="sub">大规格品种枫树 · <strong>专业话术体系</strong></div>
                            </div>
                            <div class="home-grid">
                                <div class="home-card" data-module="training">
                                    <div class="card-glow"></div>
                                    <div class="card-title">主播培训课程</div>
                                    <div class="card-desc">系统化主播成长体系</div>
                                    <span class="card-meta">6 门课程</span>
                                </div>
                                <div class="home-card" data-module="taxonomy">
                                    <div class="card-glow"></div>
                                    <div class="card-title">形态分类话术手册</div>
                                    <div class="card-desc">树形 · 色叶 · 叶形</div>
                                    <span class="card-meta">3 大分类</span>
                                </div>
                                <div class="home-card" data-module="scripts">
                                    <div class="card-glow"></div>
                                    <div class="card-title">直播全话术体系</div>
                                    <div class="card-desc">优雅从容 · 启发共鸣</div>
                                    <span class="card-meta">4 大模块</span>
                                </div>
                                <div class="home-card" data-module="varieties">
                                    <div class="card-glow"></div>
                                    <div class="card-title">品种速查手册</div>
                                    <div class="card-desc">29 个品种 · 实景图片</div>
                                    <span class="card-meta">快速检索</span>
                                </div>
                            </div>
                            <div class="home-footer">
                                <div class="copyright">
                                    <strong>© 都江堰市山秋园艺苗圃</strong><br />
                                    山秋枫树园 · 大规格品种枫树专业供应商
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ===== 培训课程 ===== -->
                    <div class="view" id="viewTraining">

    <script>
        // ================================================================
        //  风格切换（直接修改 appContainer 的类）
        // ================================================================
        const styleBtns = document.querySelectorAll('.style-switcher button');
        const appContainer = document.getElementById('appContainer');

        styleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                styleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // 移除所有风格类
                appContainer.classList.remove('style-mint', 'style-spring', 'style-misty');
                // 添加选中的风格类
                const style = btn.dataset.style;
                if (style === 'mint') appContainer.classList.add('style-mint');
                else if (style === 'spring') appContainer.classList.add('style-spring');
                else if (style === 'misty') appContainer.classList.add('style-misty');
            });
        });

        // ================================================================
        //  视图切换（无重载，无弹窗）
        // ================================================================
        const views = {
            home: document.getElementById('viewHome'),
            training: document.getElementById('viewTraining'),
            taxonomy: document.getElementById('viewTaxonomy'),
            scripts: document.getElementById('viewScripts'),
            varieties: document.getElementById('viewVarieties')
        };

        function switchView(target) {
            Object.values(views).forEach(v => v.classList.remove('active', 'slide-out'));
            const view = views[target];
            if (view) {
                view.classList.add('active');
            }
        }

        // 首页卡片点击
        document.querySelectorAll('.home-card').forEach(card => {
            card.addEventListener('click', () => {
                const module = card.dataset.module;
                if (module) {
                    switchView(module);
                }
            });
        });

        // 顶部返回按钮
        document.querySelectorAll('.module-back').forEach(btn => {
            btn.addEventListener('click', () => {
                switchView('home');
            });
        });

        // 底部导航返回按钮
        document.querySelectorAll('.bottom-nav .nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchView('home');
            });
        });

        // ================================================================
        //  品种速查 fallback 检测
        // ================================================================
        (function() {
            const iframe = document.getElementById('varietyIframe');
            const fallback = document.getElementById('varietyFallback');
            if (iframe && fallback) {
                iframe.onerror = function() {
                    fallback.style.display = 'flex';
                    iframe.style.display = 'none';
                };
                setTimeout(() => {
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow?.document;
                        if (doc && doc.body && doc.body.innerHTML.length < 50) {
                            fallback.style.display = 'flex';
                            iframe.style.display = 'none';
                        }
                    } catch (e) {
                        // 跨域无法访问，默认显示iframe
                    }
                }, 4000);
            }
        })();

        console.log('山秋枫树园 · 浅天青色 · 三种风格 (已修复)');
        console.log('风格：浅青白 | 水绿色 | 灰蓝色');
        console.log('© 都江堰市山秋园艺苗圃');
    </script>
